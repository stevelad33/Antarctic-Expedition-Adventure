kind = "web"
previewPath = "/"
title = "Antarctica Expedition"
version = "1.0.0"
id = "artifacts/antarctica-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19855

[services.development]
run = "pnpm --filter @workspace/antarctica-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/antarctica-game", "run", "build" ]
publicDir = "artifacts/antarctica-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19855"
BASE_PATH = "/"
